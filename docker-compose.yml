services:
  app:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: cc_app
    restart: unless-stopped
    working_dir: /var/www
    volumes: ["./backend:/var/www"]
    env_file: .env
    dns:
      - 109.172.95.43
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HTTPS_PROXY: "http://192.168.65.254:10801"
      HTTP_PROXY: "http://192.168.65.254:10801"
      NO_PROXY: "localhost,127.0.0.1,mysql,reverb,cc_mysql,cc_reverb"
    networks: [appnet]
    depends_on:
      mysql: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    container_name: cc_nginx
    ports: ["8000:80"]
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [appnet]

  mysql:
    image: mysql:8.0
    container_name: cc_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes: [mysql_data:/var/lib/mysql]
    ports: ["3306:3306"]
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [appnet]

  reverb:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: cc_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    ports: ["8080:8080"]
    volumes: ["./backend:/var/www"]
    env_file: .env
    dns:
      - 1.1.1.1
      - 8.8.8.8
    depends_on:
      mysql: { condition: service_healthy }
    networks: [appnet]

  telegram-poller:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: cc_poller
    restart: unless-stopped
    command: php artisan nutgram:run
    volumes: ["./backend:/var/www"]
    env_file: .env
    dns:
      - 109.172.95.43
      - 1.1.1.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      HTTPS_PROXY: "http://192.168.65.254:10801"
      HTTP_PROXY: "http://192.168.65.254:10801"
      NO_PROXY: "localhost,127.0.0.1,mysql,app,reverb,cc_mysql,cc_app,cc_reverb"
    depends_on:
      mysql: { condition: service_healthy }
      app: { condition: service_started }
    networks: [appnet]

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge