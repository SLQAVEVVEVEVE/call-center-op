services:
  app:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: cc_app
    restart: unless-stopped
    working_dir: /var/www
    volumes: ["./backend:/var/www"]
    env_file: .env
    networks: [appnet]
    depends_on:
      mysql: { condition: service_healthy }

  nginx:
    image: nginx:alpine
    container_name: cc_nginx
    restart: unless-stopped
    ports: ["80:80"]
    volumes:
      - ./backend:/var/www
      - ./frontend/dist:/var/spa:ro
      - ./docker/nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [appnet]

  mysql:
    image: mysql:8.0
    container_name: cc_mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes: [mysql_data:/var/lib/mysql]
    command: >
      --default-authentication-plugin=mysql_native_password
      --innodb-buffer-pool-size=256M
      --innodb-log-file-size=64M
      --max-connections=50
      --performance-schema=OFF
    healthcheck:
      test: ["CMD","mysqladmin","ping","-h","localhost","-u","root","-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [appnet]

  reverb:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: cc_reverb
    restart: unless-stopped
    command: php artisan reverb:start --host=0.0.0.0 --port=8080
    volumes: ["./backend:/var/www"]
    env_file: .env
    depends_on:
      mysql: { condition: service_healthy }
    networks: [appnet]

  telegram-poller:
    build: { context: ., dockerfile: docker/Dockerfile }
    container_name: cc_poller
    restart: unless-stopped
    command: php artisan nutgram:run
    volumes: ["./backend:/var/www"]
    env_file: .env
    depends_on:
      mysql: { condition: service_healthy }
      app: { condition: service_started }
    networks: [appnet]

volumes:
  mysql_data:

networks:
  appnet:
    driver: bridge
