server {
    listen 80;
    server_name _;

    # Reverb WebSocket — proxied through nginx on port 80
    location /app {
        proxy_http_version 1.1;
        proxy_set_header Host $http_host;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header X-Forwarded-For $remote_addr;
        proxy_read_timeout 60m;
        proxy_pass http://reverb:8080;
    }

    # Storage files served directly from the named volume (no symlink needed)
    location /storage {
        alias /var/www/storage/app/public;
        try_files $uri $uri/ =404;
    }

    # Laravel API + broadcasting auth + sanctum
    location ~ ^/(api|broadcasting|sanctum)/ {
        root /var/www/public;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/public/index.php;
        include fastcgi_params;
    }

    # Vue SPA — everything else
    location / {
        root /var/spa;
        try_files $uri $uri/ /index.html;
    }
}
